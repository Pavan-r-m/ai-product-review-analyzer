version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: pr_postgres
    environment:
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: n8n_password
      POSTGRES_DB: reviewsdb
    ports:
      - "5433:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - pr_pgdata:/var/lib/postgresql/data

  n8n:
    image: n8nio/n8n:latest
    container_name: pr_n8n
    ports:
      - "5679:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - DB_TYPE=sqlite
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
    volumes:
      - pr_n8n_data:/home/node/.n8n
      - ./sample_data:/home/node/.n8n-files/data
      - ./reports:/home/node/.n8n-files/reports
      - ./prompts:/home/node/.n8n-files/prompts
    depends_on:
      - postgres

volumes:
  pr_pgdata:
  pr_n8n_data: